syntax = "proto3";

option go_package = "github.com/Amir-Mallek/Distributed-Dataset-Repository/api/chunkforwarding";

package chunkforwarding;

import "google/protobuf/empty.proto";

service ChunkForwardingService {
  rpc ForwardChunk(stream ForwardChunkRequest) returns (google.protobuf.Empty);
}

message ForwardChunkRequest {
  oneof msg {
    ChunkMetadata meta = 1;
    ChunkBlock block = 2;
  }
}

message ChunkMetadata {
  uint32 chunkId = 1;
  string clientId = 2;
  string datasetId = 3;
  repeated string replicaSet = 4;
}

message ChunkBlock {
  bytes data = 2;
  fixed32 checksum = 3;
}
