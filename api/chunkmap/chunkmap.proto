syntax = "proto3";

package chunkmap;

option go_package = "github.com/Amir-Mallek/Distributed-Dataset-Repository/api/chunkmap";

import "google/protobuf/timestamp.proto";

enum ChunkStatus {
  PENDING    = 0; // record created, no server assigned yet
  UPLOADING  = 1; // servers assigned, write in progress
  SEALED     = 2; // all replicas confirmed, chunk is readable
  CORRUPTED  = 3; // all confirmed replicas lost
}

enum ServerStatus {
  SERVER_STATUS_UNSPECIFIED = 0;
  SERVER_HEALTHY = 1;
  SERVER_OFFLINE = 2;
}

message ServerRecord {
  string server_id = 1;
  string address = 2;
  google.protobuf.Timestamp last_heartbeat = 3;
  ServerStatus status = 4;
}

message DatasetRecord {
  string dataset_id = 1;
  string client_id = 2;
  string name = 3;
  uint32 next_chunk_index = 4;
  google.protobuf.Timestamp created_at = 5;
}

message ChunkRecord {
  // Identity
  string chunk_id    = 1;
  string client_id   = 2;
  string dataset_id  = 3;
  uint32 chunk_index = 4; // position of this chunk within the full dataset

  // Server locations
  repeated ServerRecord replicas = 5; // all servers assigned to hold this chunk
  repeated string confirmed_replica_ids = 6; // servers that acknowledged successful persistence
  string primary_server_id = 7; // server that accepts the write stream

  // Lifecycle
  ChunkStatus status = 8;

  // Timestamps
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp sealed_at = 10;
  google.protobuf.Timestamp last_accessed_at = 11;
}

