syntax = "proto3";

option go_package = "github.com/Amir-Mallek/Distributed-Dataset-Repository/api/chunktransfer";

package chunktransfer;

import "google/protobuf/empty.proto";

service ChunkTransferService {
  rpc WriteChunk(stream WriteChunkRequest) returns (google.protobuf.Empty);
  rpc ReadFromChunk(ReadFromChunkRequest) returns (stream ChunkData);
}

message WriteChunkRequest {
  oneof msg {
    ChunkMetadata meta = 1;
    ChunkBlock block = 2;
  }
}

message ChunkMetadata {
  uint32 chunkId = 1;
  string clientId = 2;
  string datasetId = 3;
  repeated string replicaSet = 4;
}

message ChunkBlock {
  bytes data = 2;
  fixed32 checksum = 3;
}

message ReadFromChunkRequest {
  uint32 chunkId = 1;
  string clientId=2;
  string datasetId=3;
  uint32 rangeStart = 4;
  uint32 rangeEnd = 5;
}

message ChunkData {
  bytes data = 1;
}