syntax = "proto3";

package master;

option go_package = "github.com/Amir-Mallek/Distributed-Dataset-Repository/api/master";

import "api/chunkmap/chunkmap.proto";
import "google/protobuf/empty.proto";

service ClientService {
  rpc CreateDataset(CreateDatasetRequest) returns (CreateDatasetResponse);
  rpc RequestChunkWrite(RequestChunkWriteRequest) returns (RequestChunkWriteResponse);
  rpc GetChunk(ChunkRequest) returns (chunkmap.ChunkRecord);
  rpc GetDataset(DatasetRequest) returns (chunkmap.DatasetRecord);
}

service StorageService {
  rpc RegisterServer(RegisterServerRequest) returns (RegisterServerResponse);
  rpc Heartbeat(HeartbeatRequest) returns (google.protobuf.Empty);
  rpc ConfirmReplica(ConfirmReplicaRequest) returns (google.protobuf.Empty);
  rpc MarkCorrupted(MarkCorruptedRequest) returns (google.protobuf.Empty);
}

message CreateDatasetRequest {
  string name = 1;
  string client_id = 2;
}

message CreateDatasetResponse {
  string dataset_id = 1;
  chunkmap.DatasetRecord dataset = 2;
}

message RequestChunkWriteRequest {
  string dataset_id = 1;
  uint32 chunk_index = 2;
  uint32 replication_factor = 3;
}

message RequestChunkWriteResponse {
  string chunk_id = 1;
  repeated chunkmap.ServerRecord replicas = 2;
}

message RegisterServerRequest {
  string server_id = 1;
  string address = 2;
}

message RegisterServerResponse {
  chunkmap.ServerRecord server = 1;
}

message HeartbeatRequest {
  string server_id = 1;
  string address = 2;
}

message ConfirmReplicaRequest {
  string chunk_id = 1;
  string server_id = 2;
  string address = 3;
}

// ChunkRequest is the common single-field request used by GetChunk.
message ChunkRequest {
  string chunk_id = 1;
}

message DatasetRequest {
  string dataset_id = 1;
}

message MarkCorruptedRequest {
  string chunk_id = 1;
  string server_id = 2;
}